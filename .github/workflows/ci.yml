name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test:
    # macOS runner: the app links macOS frameworks (systray/webview) via CGO.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...
